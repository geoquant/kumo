name: Bonk Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to auto-bonk
        required: true
        type: string
      dispatch_ref:
        description: Branch/ref containing the bonk workflow to dispatch (for smoke tests before merge)
        required: false
        type: string

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: bonk-check-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  bonk-check:
    name: bonk-check
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR context
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number || '' }}
          INPUT_DISPATCH_REF: ${{ github.event.inputs.dispatch_ref || '' }}
        run: |
          set -euo pipefail

          if [ -n "$INPUT_PR_NUMBER" ]; then
            PR_NUMBER="$INPUT_PR_NUMBER"
          else
            PR_NUMBER="${{ github.event.pull_request.number || '' }}"
          fi

          gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" > /tmp/pr.json

          BASE_REF=$(jq -r '.base.ref' /tmp/pr.json)
          if [ -n "$INPUT_DISPATCH_REF" ]; then
            DISPATCH_REF="$INPUT_DISPATCH_REF"
          else
            DISPATCH_REF="$BASE_REF"
          fi

          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "dispatch_ref=$DISPATCH_REF" >> "$GITHUB_OUTPUT"
          echo "draft=$(jq -r '.draft' /tmp/pr.json)" >> "$GITHUB_OUTPUT"
          echo "title=$(jq -r '.title' /tmp/pr.json)" >> "$GITHUB_OUTPUT"
          {
            echo 'body<<EOF'
            jq -r '.body // ""' /tmp/pr.json
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Post visible automatic /bonk comment
        if: steps.pr.outputs.draft != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail

          body=$'/bonk review\n\n<!-- auto-bonk -->\nTriggered automatically for this PR.'

          existing_comment_id=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" --paginate \
            --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- auto-bonk -->"))) | .id' | head -n 1)

          if [ -n "$existing_comment_id" ]; then
            gh api \
              --method PATCH \
              "repos/${{ github.repository }}/issues/comments/$existing_comment_id" \
              -f body="$body" >/dev/null
          else
            gh api \
              --method POST \
              "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
              -f body="$body" >/dev/null
          fi

      - name: Dispatch automatic Bonk review
        if: steps.pr.outputs.draft != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_REF: ${{ steps.pr.outputs.dispatch_ref }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_BODY: ${{ steps.pr.outputs.body }}
        run: |
          set -euo pipefail

          payload=$(jq -n \
            --arg ref "$DISPATCH_REF" \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_body "$PR_BODY" \
            '{ref: $ref, inputs: {pr_number: $pr_number, pr_title: $pr_title, pr_body: $pr_body}}')

          printf '%s' "$payload" | gh api \
            --method POST \
            "repos/${{ github.repository }}/actions/workflows/bonk.yml/dispatches" \
            --input -

      - name: Summarize result
        run: |
          if [ "${{ steps.pr.outputs.draft }}" = "true" ]; then
            echo "ℹ️ Skipped automatic Bonk review for draft PR #${{ steps.pr.outputs.number }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ Posted a visible automatic /bonk review comment and dispatched Bonk for PR #${{ steps.pr.outputs.number }}" >> "$GITHUB_STEP_SUMMARY"
          fi
