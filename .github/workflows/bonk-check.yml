name: Bonk Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  actions: write
  contents: read
  pull-requests: read

jobs:
  bonk-check:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch automatic Bonk review
        if: github.event.pull_request.draft == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: |
          payload=$(jq -n \
            --arg ref "$BASE_REF" \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_body "$PR_BODY" \
            '{ref: $ref, inputs: {pr_number: $pr_number, pr_title: $pr_title, pr_body: $pr_body}}')

          printf '%s' "$payload" | gh api \
            --method POST \
            "repos/${{ github.repository }}/actions/workflows/bonk.yml/dispatches" \
            --input -

      - name: Summarize result
        run: |
          if [ "${{ github.event.pull_request.draft }}" = "true" ]; then
            echo "ℹ️ Skipped automatic Bonk review for draft PR #${{ github.event.pull_request.number }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ Dispatched automatic Bonk review for PR #${{ github.event.pull_request.number }}" >> "$GITHUB_STEP_SUMMARY"
          fi
