name: Bonk

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review automatically
        required: true
        type: string
      pr_title:
        description: Pull request title
        required: true
        type: string
      pr_body:
        description: Pull request body
        required: false
        type: string

concurrency:
  # intentionally hardcoded so that all Bonk workflows coexist peacefully
  group: bonk-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number || github.ref }}
  cancel-in-progress: false

jobs:
  bonk:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.sender.type != 'Bot' &&
        contains(github.event.comment.body, '/bonk') &&
        !contains(github.event.comment.body, '/bigbonk')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup pnpm
        if: github.event_name != 'workflow_dispatch'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: github.event_name != 'workflow_dispatch'
        uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - name: Install dependencies
        if: github.event_name != 'workflow_dispatch'
        run: pnpm install --frozen-lockfile

      - name: Run Lil Bonk
        if: github.event_name != 'workflow_dispatch'
        uses: ask-bonk/ask-bonk/github@main
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_AI_GATEWAY_ACCOUNT_ID }}
          CLOUDFLARE_GATEWAY_ID: ${{ secrets.CF_AI_GATEWAY_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_AI_GATEWAY_TOKEN }}
        with:
          model: "cloudflare-ai-gateway/workers-ai/@cf/moonshotai/kimi-k2.5"
          agent: kumo
          mentions: "/bonk"
          permissions: write

      - name: Run automatic Bonk review
        if: github.event_name == 'workflow_dispatch'
        uses: ask-bonk/ask-bonk/github@main
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_AI_GATEWAY_ACCOUNT_ID }}
          CLOUDFLARE_GATEWAY_ID: ${{ secrets.CF_AI_GATEWAY_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_AI_GATEWAY_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          ISSUE_NUMBER: ${{ github.event.inputs.pr_number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        with:
          model: "cloudflare-ai-gateway/workers-ai/@cf/moonshotai/kimi-k2.5"
          agent: kumo
          permissions: any
          token_permissions: NO_PUSH
          prompt: |
            Review PR #${{ github.event.inputs.pr_number }} in ${{ github.repository }}.

            This run was automatically dispatched when the PR was opened, updated, or marked ready for review. Review-only mode: do not modify code or push commits. Read AGENTS.md before reviewing. Prefer leaving one cohesive PR review with inline comments only where they are high-signal.

            Focus on correctness, regressions, CI/workflow breakage, security, and repo conventions. If the PR is clean, say so clearly.

            <pr_number>
            ${{ github.event.inputs.pr_number }}
            </pr_number>
            <pr_title>
            ${{ github.event.inputs.pr_title }}
            </pr_title>
            <pr_description>
            ${{ github.event.inputs.pr_body }}
            </pr_description>
